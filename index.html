<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SkyElite — Premium Private Jet Charter</title>
    <meta name="description" content="SkyElite offers premium private jet charter with 340+ global destinations, same-day booking, and dedicated concierge service. Fly on your schedule, in absolute privacy." />
    <meta name="keywords" content="private jet charter, private aviation, luxury jets, jet rental, SkyElite, private flights, charter flights" />
    <meta name="author" content="SkyElite Aviation" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://skyelite.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skyelite.com/" />
    <meta property="og:title" content="SkyElite — Premium Private Jet Charter" />
    <meta property="og:description" content="Fly private, fly elite. 340+ global destinations, same-day booking, and a dedicated concierge — all crafted around you." />
    <meta property="og:image" content="https://skyelite.com/og-image.jpg" />
    <meta property="og:site_name" content="SkyElite Aviation" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://skyelite.com/" />
    <meta name="twitter:title" content="SkyElite — Premium Private Jet Charter" />
    <meta name="twitter:description" content="Fly private, fly elite. 340+ global destinations, same-day booking, and a dedicated concierge — all crafted around you." />
    <meta name="twitter:image" content="https://skyelite.com/og-image.jpg" />

    <!-- Theme & App -->
    <meta name="theme-color" content="#08090F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SkyElite" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "SkyElite Aviation",
      "description": "Premium private jet charter with 340+ global destinations and dedicated concierge service.",
      "url": "https://skyelite.com",
      "logo": "https://skyelite.com/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://instagram.com/immoebarbar"
      ],
      "priceRange": "$$$"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
