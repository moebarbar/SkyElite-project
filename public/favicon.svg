<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#08090F"/>
  <!-- Gold gradient definition -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2C98A"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
  </defs>
  <!-- Stylised "S" lettermark -->
  <text x="32" y="46"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="400"
    fill="url(#gold)">S</text>
  <!-- Gold underline accent -->
  <rect x="20" y="51" width="24" height="1.5" rx="0.75" fill="#C9A96E" opacity="0.5"/>
</svg>
